spring:
  application:
    name: carddemo

  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    jwt:
      secret-key: change-me-in-production-use-256-bit-key-minimum
      expiration-ms: 3600000

server:
  port: 8080

logging:
  level:
    com.carddemo: INFO
    org.springframework.security: INFO
