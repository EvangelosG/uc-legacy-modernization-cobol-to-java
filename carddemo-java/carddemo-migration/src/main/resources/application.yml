spring:
  application:
    name: carddemo-migration
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

carddemo:
  migration:
    data-dir: ./app/data/ASCII
    export-dir: ./export
