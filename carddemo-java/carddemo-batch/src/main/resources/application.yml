spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

logging:
  level:
    com.carddemo.batch: INFO
    org.springframework.batch: INFO
